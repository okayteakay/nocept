version: "3.9"

# Invoice Exception Resolution System — Minimal Architecture
#
# Services:
#   - redis: Data store, state machine, audit logs
#   - api: FastAPI orchestrate/api.py — unified ingestion + approval endpoints
#
# Start:    docker compose up -d
# Stop:     docker compose down
# Wipe:     docker compose down -v
# Logs:     docker compose logs -f api

services:
  redis:
    image: redis:7-alpine
    container_name: nocept-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: nocept-api
    command: |
      uvicorn orchestrate.api:app
        --host 0.0.0.0
        --port 8000
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
    volumes:
      - .:/app

volumes:
  redis_data:
    driver: local
