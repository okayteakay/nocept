version: "3.9"

# Redis Stack — includes the Search module required for vector similarity queries.
# Replaces a plain redis:7 container.
#
# Start:  docker compose up -d
# Stop:   docker compose down
# Wipe:   docker compose down -v   (removes persisted data volume)
#
# The standard redis://localhost:6379/0 URL is unchanged, so no other config
# needs updating.

services:
  redis:
    image: redis/redis-stack:latest
    container_name: nocept-redis
    ports:
      - "6379:6379"    # Redis (same port as plain Redis)
      - "8001:8001"    # RedisInsight UI — open http://localhost:8001 to browse keys
    volumes:
      - redis_data:/data
    environment:
      REDIS_ARGS: "--save 60 1 --loglevel warning"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
